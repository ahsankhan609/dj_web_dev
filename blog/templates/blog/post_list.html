{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h1>{{ heading }}</h1>
<p>{{ description }}</p>

<ul>
    {% for post in posts %}
    <li>
        <a href="{% url 'blog:post-detail' post.slug %}">{{ post.title }}</a>
    </li>
    {% endfor %}
</ul>
{% endblock %}
